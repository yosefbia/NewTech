<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minecraft 2D — Play</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛏️</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/tiles.css" />
  <link rel="stylesheet" href="css/game.css" />
</head>
<body class="game-page">

  <header class="game-header">
    <a class="btn btn-ghost" href="index.html">&larr; Home</a>
    <h1 class="logo">MINE<span class="accent">CRAFT</span> 2D</h1>
    <div class="world-meta" id="world-name"></div>
    <div class="actions">
      <button type="button" class="btn btn-ghost" id="new-world-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <rect x="4" y="4" width="16" height="16" rx="3" />
          <circle cx="9" cy="9" r="1.3" fill="currentColor" stroke="none" />
          <circle cx="15" cy="9" r="1.3" fill="currentColor" stroke="none" />
          <circle cx="9" cy="15" r="1.3" fill="currentColor" stroke="none" />
          <circle cx="15" cy="15" r="1.3" fill="currentColor" stroke="none" />
        </svg>
        New world
      </button>
      <button type="button" class="btn btn-primary" id="reset-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="1 4 1 10 7 10" />
          <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10" />
        </svg>
        Reset world
      </button>
    </div>
  </header>

  <main class="game-layout">

    <!-- Toolbar container is hardcoded on purpose (assignment tip):
         only the world tiles and pack slots are generated by JS. -->
    <aside class="panel">
      <h2>Tools</h2>
      <div class="toolbar" id="toolbar">
        <button type="button" class="tool" data-tool="axe" aria-pressed="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M6.2 20.8 13 10.4" />
            <path d="M11.2 4.6c2.8-1.6 6.4-.8 8.2 2.2-2.9.4-5 1.7-6.3 4.6-1.9-1.5-2.7-4.3-1.9-6.8Z" fill="currentColor" stroke="none" />
          </svg>
          <span>Axe</span>
          <kbd>1</kbd>
        </button>
        <button type="button" class="tool" data-tool="pickaxe" aria-pressed="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 6.5v14" />
            <path d="M4.5 10.5C7 5.6 17 5.6 19.5 10.5" />
          </svg>
          <span>Pickaxe</span>
          <kbd>2</kbd>
        </button>
        <button type="button" class="tool" data-tool="shovel" aria-pressed="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9.4 3.5h5.2M12 3.5v9" />
            <path d="M8.6 12.5h6.8v3c0 2.9-1.5 4.7-3.4 5.5-1.9-.8-3.4-2.6-3.4-5.5Z" fill="currentColor" stroke="none" />
          </svg>
          <span>Shovel</span>
          <kbd>3</kbd>
        </button>
        <button type="button" class="tool" data-tool="bucket" aria-pressed="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M7.2 8C7.9 4.4 16.1 4.4 16.8 8" />
            <path d="M5.5 8.5h13l-1.4 9.6c-.2 1.1-1 1.9-2 1.9H8.9c-1 0-1.8-.8-2-1.9Z" fill="currentColor" stroke="none" />
          </svg>
          <span>Bucket</span>
          <kbd>4</kbd>
        </button>
      </div>
      <p class="panel-tip">
        Match the tool to the block: the Axe chops trees, the Pickaxe mines
        rock, the Shovel digs grass, dirt &amp; sand and the Bucket scoops water.
      </p>
    </aside>

    <section>
      <div class="world-frame">
        <div class="world-stage">
          <div class="sky-decor" aria-hidden="true">
            <span class="sun"></span>
            <span class="cloud cloud-1"></span>
            <span class="cloud cloud-2"></span>
          </div>
          <div class="world" id="world" data-mode="idle"></div>
        </div>
      </div>
      <p class="status" id="status" data-kind="info" role="status">Loading world&hellip;</p>
    </section>

    <aside class="panel">
      <h2>Pack <span class="badge" id="pack-count">0</span></h2>
      <div class="inventory-slots" id="inventory-slots"></div>
      <p class="panel-tip">
        Click a block in the pack to take it in hand, then click an empty
        spot in the world to place it back.
      </p>
    </aside>

  </main>

  <script src="js/config.js"></script>
  <script src="js/worlds.js"></script>
  <script src="js/inventory.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
