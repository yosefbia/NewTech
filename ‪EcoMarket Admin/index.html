<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EcoMarket Admin – Flexbox Ops</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Top Navigation -->
    <header class="navbar">
      <div class="logo-section">
        <span class="logo">🌱</span>
        <h1>EcoMarket Admin</h1>
      </div>

      <nav class="nav-links">
        <a href="#">Dashboard</a>
        <a href="#">Products</a>
        <a href="#">Orders</a>
        <a href="#">Settings</a>
      </nav>
    </header>

    <!-- Main Layout -->
    <main class="main-container">
      <!-- Sidebar -->
      <aside class="sidebar">
        <h2>Categories</h2>

        <div class="category-list">
          <button>Organic</button>
          <button>Vegan</button>
          <button>Eco-Packaging</button>
        </div>
      </aside>

      <!-- Main Content -->
      <section class="content-area">
        <div class="cards-container">
          <article class="product-card">
            <h3>🍯 Natural Honey</h3>
          </article>

          <article class="product-card">
            <h3>🌿 Herbal Tea</h3>
          </article>

          <article class="product-card">
            <h3>🥜 Organic Snacks</h3>
          </article>

          <article class="product-card">
            <h3>🧼 Bamboo Soap</h3>
          </article>

          <article class="product-card active">
            <h3>🪴 Plant Kits</h3>
          </article>

          <article class="product-card featured">
            <h3>♻️ Reusable Bottles</h3>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
